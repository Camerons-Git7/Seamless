name: Sync files from foodcases

on:
  # Run manually from the Actions tab
  workflow_dispatch:
  
  # Or run automatically every day at midnight
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout foodcases repo
        uses: actions/checkout@v4
        with:
          repository: Camerons-Git7/foodcases
          path: temp-foodcases
      
      - name: Copy files from foodcases
        run: |
          # Remove old files (optional — remove this if you want to keep existing files)
          # rm -rf *
          
          # Copy all files from foodcases (excluding .git)
          cp -r temp-foodcases/* . 2>/dev/null || true
          
          # Remove the temp folder
          rm -rf temp-foodcases
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Sync files from Camerons-Git7/foodcases"
          git push
