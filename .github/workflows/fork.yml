name: Sync files from foodcases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}  # Use PAT instead of GITHUB_TOKEN
      
      - name: Checkout foodcases repo
        uses: actions/checkout@v4
        with:
          repository: Camerons-Git7/foodcases
          path: temp-foodcases
      
      - name: Copy files from foodcases
        run: |
          cp -r temp-foodcases/* . 2>/dev/null || true
          rm -rf temp-foodcases
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Sync files from Camerons-Git7/foodcases"
          git push
